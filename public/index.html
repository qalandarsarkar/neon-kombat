<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none" />
  <title>Neon Kombat Mini App</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at center, #1a1a2e, #0f0f1b);
      color: #fff;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-tag {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #00f2fe;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
      font-weight: bold;
    }

    .score-container {
      text-align: center;
      margin-top: 20px;
    }

    .score-title {
      font-size: 0.9rem;
      color: #8a8a9e;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .score {
      font-size: 3.5rem;
      font-weight: 900;
      color: #00f2fe;
      text-shadow: 0 0 20px #00f2fe,
                   0 0 40px #4facfe;
      margin: 5px 0;
    }

    .coin-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 40vh;
    }

    .coin-button {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00f2fe, #4facfe);
      box-shadow: 0 0 30px #00f2fe,
                  inset 0 0 20px rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5.5rem;
      cursor: pointer;
      transition: transform 0.05s ease;
      user-select: none;
    }

    .coin-button:active {
      transform: scale(0.95);
      box-shadow: 0 0 50px #00f2fe;
    }

    .energy-container {
      width: 90%;
      max-width: 400px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .energy-text {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,0,255,0.3);
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ff00ff, #7928ca);
      border-radius: 6px;
      transition: width 0.1s linear;
    }

    .floating-text {
      position: absolute;
      font-size: 1.8rem;
      font-weight: bold;
      color: #00f2fe;
      text-shadow: 0 0 10px #00f2fe;
      animation: floatUp 0.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {

      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-100px) scale(1.2);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="user-tag" id="username">Player</div>
  </div>

  <div class="score-container">
    <div class="score-title">Neon Balance</div>
    <div class="score" id="score">0</div>
  </div>

  <div class="coin-container">
    <div class="coin-button" id="coinBtn">🦁</div>
  </div>

  <div class="energy-container">
    <div class="energy-text" id="energyText">1000 / 1000</div>

    <div class="progress-bar">
      <div class="progress-fill" id="energyFill"></div>
    </div>
  </div>

  <script>

    /* =========================
       FIREBASE CONFIG
    ========================= */

    const firebaseConfig = {
      apiKey: "AIzaSyCzg-_imaxBIWlQqFmOkkzMenj7aaumghU",
      authDomain: "neon-kombat.firebaseapp.com",
      databaseURL: "https://neon-kombat-default-rtdb.firebaseio.com",
      projectId: "neon-kombat",
      storageBucket: "neon-kombat.firebasestorage.app",
      messagingSenderId: "974101662583",
      appId: "1:974101662583:web:103363a4b259f2f0306f72"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    /* =========================
       TELEGRAM SETUP
    ========================= */

    const tg = window.Telegram.WebApp;

    tg.expand();

    const tgUser = tg.initDataUnsafe?.user || {
      id: "demo_user",
      first_name: "Demo"
    };

    const userId = String(tgUser.id);

    document.getElementById("username").innerText =
      `@${tgUser.username || tgUser.first_name}`;

    /* =========================
       GAME VARIABLES
    ========================= */

    let score = 0;
    let energy = 1000;

    const maxEnergy = 1000;

    const scoreEl = document.getElementById("score");
    const energyTextEl = document.getElementById("energyText");
    const energyFillEl = document.getElementById("energyFill");
    const coinBtn = document.getElementById("coinBtn");

    /* =========================
       UPDATE UI
    ========================= */

    function updateUI() {

      scoreEl.innerText = score;

      energyTextEl.innerText =
        `${energy} / ${maxEnergy}`;

      energyFillEl.style.width =
        `${(energy / maxEnergy) * 100}%`;

    }

    /* =========================
       LOAD PLAYER DATA
    ========================= */

    async function loadPlayerData() {

      try {

        const docRef =
          db.collection("players").doc(userId);

        const docSnap =
          await docRef.get();

        if (docSnap.exists) {

          const data = docSnap.data();

          score = data.score || 0;
          energy = data.energy || 1000;

          console.log("Firebase Data Loaded");

        } else {

          score =
            parseInt(localStorage.getItem("neon_score")) || 0;

          energy =
            parseInt(localStorage.getItem("neon_energy")) || 1000;

          await savePlayerData();

          console.log("New Player Created");
        }

        updateUI();

      } catch (err) {

        console.error("LOAD ERROR:", err);

      }
    }

    /* =========================
       SAVE PLAYER DATA
    ========================= */

    async function savePlayerData() {

      try {

        await db.collection("players")
          .doc(userId)
          .set({
            name: tgUser.first_name || "Player",
            username: tgUser.username || "",
            score: score,
            energy: energy,
            updatedAt: Date.now()
          });

        localStorage.setItem("neon_score", score);
        localStorage.setItem("neon_energy", energy);

        console.log("Data Saved");

      } catch (err) {

        console.error("SAVE ERROR:", err);

      }
    }

    /* =========================
       TAP SYSTEM
    ========================= */

    coinBtn.addEventListener("click", async (e) => {

      if (energy <= 0) return;

      score += 1;
      energy -= 1;

      updateUI();

      createFloatingText(e.clientX, e.clientY);

      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("medium");
      }

      await savePlayerData();

    });

    /* =========================
       FLOATING +1 EFFECT
    ========================= */

    function createFloatingText(x, y) {

      const text =
        document.createElement("div");

      text.className = "floating-text";

      text.innerText = "+1";

      text.style.left = `${x - 15}px`;

      text.style.top = `${y - 30}px`;

      document.body.appendChild(text);

      setTimeout(() => {

        text.remove();

      }, 600);
    }

    /* =========================
       ENERGY AUTO REFILL
    ========================= */

    setInterval(async () => {

      if (energy < maxEnergy) {

        energy =
          Math.min(maxEnergy, energy + 2);

        updateUI();

        await savePlayerData();

      }

    }, 1000);

    /* =========================
       START GAME
    ========================= */

    loadPlayerData();

  </script>

</body>
  </html>
