<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>Neon Kombat Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 0; background: radial-gradient(circle at center, #1a1a2e, #0f0f1b);
      color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      height: 100vh; overflow: hidden;
    }
    .header { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .user-tag { background: rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 20px; border: 1px solid #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); font-weight: bold; }
    .score-container { text-align: center; margin-top: 20px; }
    .score-title { font-size: 0.9rem; color: #8a8a9e; text-transform: uppercase; letter-spacing: 2px; }
    .score { font-size: 3.5rem; font-weight: 900; color: #00f2fe; text-shadow: 0 0 20px #00f2fe, 0 0 40px #4facfe; margin: 5px 0; }
    
    .coin-container { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 40vh; }
    .coin-button {
      width: 200px; height: 200px; border-radius: 50%;
      background: linear-gradient(145deg, #00f2fe, #4facfe);
      box-shadow: 0 0 30px #00f2fe, inset 0 0 20px rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center; font-size: 5.5rem;
      cursor: pointer; transition: transform 0.05s ease; user-select: none;
    }
    .coin-button:active { transform: scale(0.95); box-shadow: 0 0 50px #00f2fe; }

    .energy-container { width: 90%; max-width: 400px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .energy-text { font-size: 1.1rem; margin-bottom: 8px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; font-weight: bold; }
    .progress-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,0,255,0.3); }
    .progress-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff00ff, #7928ca); border-radius: 6px; transition: width 0.1s linear; }
    
    .floating-text { position: absolute; font-size: 1.8rem; font-weight: bold; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; animation: floatUp 0.6s ease-out forwards; pointer-events: none; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.2); } }
  </style>
</head>
<body>

  <div class="header">
    <div class="user-tag" id="username">Player</div>
  </div>

  <div class="score-container">
    <div class="score-title">Neon Balance</div>
    <div class="score" id="score">0</div>
  </div>

  <div class="coin-container">
    <div class="coin-button" id="coinBtn">🦁</div>
  </div>

  <div class="energy-container">
    <div class="energy-text" id="energyText">1000 / 1000</div>
    <div class="progress-bar">
      <div class="progress-fill" id="energyFill"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Full screen open hoga

    // Telegram User Name load karein
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      document.getElementById('username').innerText = `@${tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name}`;
    }

    // Game Variables
    let score = parseInt(localStorage.getItem('neon_score')) || 0;
    let energy = parseInt(localStorage.getItem('neon_energy')) || 1000;
    const maxEnergy = 1000;

    const scoreEl = document.getElementById('score');
    const energyTextEl = document.getElementById('energyText');
    const energyFillEl = document.getElementById('energyFill');
    const coinBtn = document.getElementById('coinBtn');

    // Initial Load
    scoreEl.innerText = score;
    updateEnergyUI();

    function updateEnergyUI() {
      energyTextEl.innerText = `${energy} / ${maxEnergy}`;
      energyFillEl.style.width = `${(energy / maxEnergy) * 100}%`;
    }

    // Tap Function
    coinBtn.addEventListener('click', (e) => {
      if (energy > 0) {
        score += 1;
        energy -= 1;
        
        scoreEl.innerText = score;
        updateEnergyUI();
        
        // Save data local storage mein
        localStorage.setItem('neon_score', score);
        localStorage.setItem('neon_energy', energy);

        // Floating "+1" Effect
        createFloatingText(e.clientX, e.clientY);

        // Haptic Feedback (Vibration)
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      }
    });

    function createFloatingText(x, y) {
      const text = document.createElement('div');
      text.className = 'floating-text';
      text.innerText = '+1';
      text.style.left = `${x - 15}px`;
      text.style.top = `${y - 30}px`;
      document.body.appendChild(text);
      
      setTimeout(() => text.remove(), 600);
    }

    // Energy Refill Over Time (Har 1 second mein +2 energy)
    setInterval(() => {
      if (energy < maxEnergy) {
        energy = Math.min(maxEnergy, energy + 2);
        localStorage.setItem('neon_energy', energy);
        updateEnergyUI();
      }
    }, 1000);
  </script>
</body>
</html>
